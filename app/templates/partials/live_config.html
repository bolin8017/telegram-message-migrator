<form hx-post="/api/live/start"
      hx-target="#step-3-content"
      hx-swap="innerHTML"
      hx-indicator="#live-spinner">

  <input type="hidden" name="source_chat_id" value="{{ source_chat_id }}" />

  <div class="space-y-4">
    <div class="alert alert-info text-sm py-2">
      <span>Live mode monitors the source chat for new messages and forwards them in real-time.</span>
    </div>

    <!-- Source info -->
    <div class="flex items-center gap-2 text-sm">
      <span class="opacity-60">Monitoring:</span>
      <span class="font-medium">{{ source_chat_title or 'Chat #' ~ source_chat_id }}</span>
    </div>

    <!-- Transfer mode -->
    <div class="form-control">
      <label class="label"><span class="label-text">Mode</span></label>
      <select name="mode" class="select select-bordered select-sm w-full">
        <option value="forward" selected>Forward</option>
        <option value="copy">Copy</option>
      </select>
    </div>

    <!-- Target type -->
    <div class="form-control">
      <label class="label"><span class="label-text">Destination</span></label>
      <select name="target_type" class="select select-bordered select-sm w-full"
              onchange="
                var mt = document.getElementById('live-manual-target');
                mt.classList.toggle('hidden', this.value !== 'manual');
                if (this.value === 'manual') {
                  htmx.ajax('GET', '/api/transfer/target-chats', {target: '#live-target-select', swap: 'innerHTML'});
                }
              ">
        <option value="saved_messages" selected>Saved Messages (Account B)</option>
        <option value="manual">Select a chat on Account B</option>
      </select>
    </div>

    <div id="live-manual-target" class="hidden form-control">
      <select name="target_chat_id" id="live-target-select" class="select select-bordered select-sm w-full">
        <option disabled selected>Select destination...</option>
      </select>
    </div>

    <!-- Filters -->
    <details class="collapse collapse-arrow bg-base-200 rounded-lg">
      <summary class="collapse-title text-sm font-medium py-2 min-h-0">Filters</summary>
      <div class="collapse-content space-y-2 pb-3">
        <label class="flex items-center gap-2 cursor-pointer">
          <input type="checkbox" name="include_text" class="checkbox checkbox-sm" checked />
          <span class="label-text">Text messages</span>
        </label>
        <label class="flex items-center gap-2 cursor-pointer">
          <input type="checkbox" name="include_media" class="checkbox checkbox-sm" checked />
          <span class="label-text">Media</span>
        </label>
        <div class="form-control">
          <label class="label py-1"><span class="label-text text-xs">Keyword whitelist (comma-separated)</span></label>
          <input type="text" name="keyword_whitelist" class="input input-bordered input-xs w-full" />
        </div>
        <div class="form-control">
          <label class="label py-1"><span class="label-text text-xs">Keyword blacklist (comma-separated)</span></label>
          <input type="text" name="keyword_blacklist" class="input input-bordered input-xs w-full" />
        </div>
      </div>
    </details>

    <button type="submit" class="btn btn-success w-full" onclick="showStep(3)">
      <span id="live-spinner" class="loading loading-spinner loading-xs htmx-indicator"></span>
      Start Live Forwarding
    </button>
  </div>
</form>
