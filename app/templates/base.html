<!DOCTYPE html>
<html lang="zh-Hant" data-theme="dark">
<script>
  // Restore saved theme before first paint to avoid flash
  (function(){ var t = localStorage.getItem('theme'); if (t) document.documentElement.setAttribute('data-theme', t); })();
</script>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Telegram Message Migrator</title>
  <link href="https://cdn.jsdelivr.net/npm/daisyui@4/dist/full.min.css" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/htmx.org@2.0.4"></script>
  <script src="https://unpkg.com/htmx-ext-sse@2.2.2/sse.js"></script>
  <script>
    // CSRF: read token from cookie and attach to every HTMX request
    document.addEventListener('htmx:configRequest', function(e) {
      var match = document.cookie.match(/(?:^|;\s*)csrf_token=([^;]*)/);
      if (match) e.detail.headers['X-CSRF-Token'] = decodeURIComponent(match[1]);
    });
    // Sync theme toggle checkbox with stored preference
    document.addEventListener('DOMContentLoaded', function() {
      var el = document.getElementById('theme-toggle');
      if (el) el.checked = localStorage.getItem('theme') === 'light';
    });
  </script>
  <style>
    @media (max-width: 767px) {
      .steps-horizontal { font-size: 0.75rem; }
    }
  </style>
</head>
<body class="min-h-screen bg-base-200 text-base-content">
  <div class="container mx-auto max-w-5xl px-4 py-8">
    <header class="mb-8 flex items-center justify-between" role="banner">
      <h1 class="text-2xl font-bold">Telegram Message Migrator</h1>
      <div class="flex items-center gap-3">
        <label class="swap swap-rotate btn btn-ghost btn-sm" aria-label="Toggle theme">
          <input type="checkbox" id="theme-toggle"
                 onchange="var t = this.checked ? 'light' : 'dark'; document.documentElement.setAttribute('data-theme', t); localStorage.setItem('theme', t)" />
          <svg class="swap-off fill-current w-5 h-5" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M5.64 17l-.71.71a1 1 0 0 0 0 1.41 1 1 0 0 0 1.41 0l.71-.71A1 1 0 0 0 5.64 17zM5 12a1 1 0 0 0-1-1H3a1 1 0 0 0 0 2h1a1 1 0 0 0 1-1zm7-7a1 1 0 0 0 1-1V3a1 1 0 0 0-2 0v1a1 1 0 0 0 1 1zm5.66 2.34a1 1 0 0 0 .7-.29l.71-.71a1 1 0 1 0-1.41-1.41l-.72.71a1 1 0 0 0 .72 1.7zm-12 .29a1 1 0 0 0 .7.29 1 1 0 0 0 .71-.29 1 1 0 0 0 0-1.41l-.71-.71a1 1 0 0 0-1.41 1.41zM21 11h-1a1 1 0 0 0 0 2h1a1 1 0 0 0 0-2zm-9 8a1 1 0 0 0-1 1v1a1 1 0 0 0 2 0v-1a1 1 0 0 0-1-1zm6.36-2.36a1 1 0 0 0-1.41 1.41l.71.71a1 1 0 0 0 1.41 0 1 1 0 0 0 0-1.41zM12 6.5A5.5 5.5 0 1 0 17.5 12 5.51 5.51 0 0 0 12 6.5zm0 9A3.5 3.5 0 1 1 15.5 12 3.5 3.5 0 0 1 12 15.5z"/></svg>
          <svg class="swap-on fill-current w-5 h-5" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M21.64 13a1 1 0 0 0-1.05-.14 8.05 8.05 0 0 1-3.37.73A8.15 8.15 0 0 1 9.08 5.49a8.59 8.59 0 0 1 .25-2 1 1 0 0 0-.64-1.11 1 1 0 0 0-1.18.41 10 10 0 1 0 14.88 11.17A1 1 0 0 0 21.64 13z"/></svg>
        </label>
      </div>
    </header>
    <main role="main" aria-label="Transfer wizard">
      {% block content %}{% endblock %}
    </main>
  </div>
</body>
</html>
